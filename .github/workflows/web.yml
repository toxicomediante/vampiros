name: Deploy Web Preview

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.7.1

jobs:
  build:
    name: Build Godot Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Configure Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Validate PNG assets
        run: python3 tools/validate_pngs.py

      - name: Generate original background music
        shell: bash
        run: |
          python3 tools/generate_night_drive.py
          test -s assets/audio/neon_blood_drive.wav

      - name: Import project
        run: godot --headless --editor --path . --import --quit

      - name: Export web build
        shell: bash
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web" build/web/index.html
          test -s build/web/index.html
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
