name: Deploy Web Preview
# Redeploy after enabling public GitHub Pages.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.7.1

jobs:
  build:
    name: Export and deploy Godot Web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Show Godot version
        run: godot --version

      - name: Import project
        run: godot --headless --editor --path . --import --quit

      - name: Validate project
        run: godot --headless --editor --path . --quit-after 2

      - name: Export web build
        shell: bash
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web" build/web/index.html
          test -s build/web/index.html
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4
