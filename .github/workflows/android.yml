name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GODOT_VERSION: 4.7.1

jobs:
  build:
    name: Export debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Configure Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Create Android debug keystore
        shell: bash
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v               -keystore "$HOME/.android/debug.keystore"               -storepass android               -alias androiddebugkey               -keypass android               -keyalg RSA               -keysize 2048               -validity 10000               -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Configure Godot Android paths
        shell: bash
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/java_sdk_path = "$JAVA_HOME"
          EOF

      - name: Show tool versions
        shell: bash
        run: |
          godot --version
          java -version
          sdkmanager --version

      - name: Generate original background music
        shell: bash
        run: |
          python3 tools/generate_night_drive.py
          test -s assets/audio/neon_blood_drive.wav

      - name: Import project
        run: godot --headless --editor --path . --import --quit

      - name: Validate project
        run: godot --headless --editor --path . --quit-after 2

      - name: Export APK
        shell: bash
        run: |
          mkdir -p build
          godot --headless --path . --export-debug "Android Debug" build/vampiros-debug.apk

      - name: Verify APK
        shell: bash
        run: |
          test -s build/vampiros-debug.apk
          "$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt" dump badging build/vampiros-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vampiros-android-debug
          path: build/vampiros-debug.apk
          if-no-files-found: error
          retention-days: 14
